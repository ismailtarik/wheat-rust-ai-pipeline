project:
  name: "wheat-rust-ai-pipeline"
  author: "Tarik Ismail"
  lab: "MDSET — Hassan First University, Settat"
  seed: 42

# ------------------------------------------------------------
# Kaggle Dataset
# ------------------------------------------------------------
kaggle:
  dataset_id: "kushagra3204/wheat-plant-diseases"
  download_path: "data/raw/WheatPlantDiseases"

# ------------------------------------------------------------
# Classes ciblées
# ------------------------------------------------------------
# Ce dataset est 100% Wheat (pas besoin de filtrer par plante).
#
# mode: "auto"   → toutes les classes du dataset sont utilisées
#                   automatiquement, quels que soient leurs noms exacts
#                   de dossier (recommandé pour ce dataset).
# mode: "manual" → seules les classes listées dans label_map sont gardées
#                   (comportement précédent, utile pour PlantVillage).
classes:
  target_plant: "Wheat"
  mode: "auto"
  label_map:
    # Utilisé seulement si mode = "manual".
    # Laisse vide ou complète après avoir vu les noms réels des dossiers
    # (affichés automatiquement à l'étape 1 du pipeline).
    Wheat___Yellow_Rust:  "Yellow_Rust"
    Wheat___Stripe_Rust:  "Yellow_Rust"
    Wheat___Brown_Rust:   "Brown_Rust"
    Wheat___Leaf_Rust:    "Brown_Rust"
    Wheat___Stem_Rust:    "Stem_Rust"
    Wheat___Black_Rust:   "Stem_Rust"
    Wheat___Healthy:      "Healthy"
  num_classes: "auto"   # calculé automatiquement si mode = "auto"

# ------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------
preprocessing:
  img_size: [256, 256]
  channels: 3
  normalization: "minmax"       # minmax → [0,1]
  noise_std: 0.02               # bruit gaussien terrain

# ------------------------------------------------------------
# Augmentation (train seulement)
# ------------------------------------------------------------
augmentation:
  enabled: true
  flip_horizontal: true
  flip_vertical: true
  brightness_delta: 0.2
  contrast_range: [0.8, 1.2]
  saturation_range: [0.8, 1.2]
  hue_delta: 0.05
  zoom_factor: 1.1              # crop depuis 110% de la taille

# ------------------------------------------------------------
# Split dataset
# ------------------------------------------------------------
split:
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15
  stratify: true

# ------------------------------------------------------------
# Pipeline tf.data
# ------------------------------------------------------------
pipeline:
  batch_size: 32
  prefetch: true                # tf.data.AUTOTUNE

# ------------------------------------------------------------
# Chemins de sortie
# ------------------------------------------------------------
paths:
  raw_data:      "data/raw/WheatPlantDiseases"
  processed:     "data/processed"
  reports:       "data/reports"
  outputs:       "outputs"
  notebooks:     "notebooks"
  train_csv:     "data/processed/train.csv"
  val_csv:       "data/processed/val.csv"
  test_csv:      "data/processed/test.csv"
  metadata_json: "data/processed/metadata.json"